# GitHub Actions CI Workflow
# Validates pull requests before merge

name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # Stage 1: Code Quality (parallel)
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install flake8 black mypy
      - name: Run flake8
        run: flake8 backend/app --max-line-length=120 --ignore=E501,W503
      - name: Check formatting
        run: black --check backend/app
        continue-on-error: true
      - name: Run mypy
        run: mypy backend/app --ignore-missing-imports
        continue-on-error: true

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend
        continue-on-error: true
      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend
        continue-on-error: true

  # Stage 2: Unit Tests (parallel, depends on lint)
  test-backend-unit:
    name: Backend Unit Tests
    needs: [lint-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
        working-directory: backend
      - name: Run unit tests
        run: |
          pytest tests/unit -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: "test-secret-key"
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 30

  test-frontend-unit:
    name: Frontend Unit Tests
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run unit tests
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  # Stage 3: Integration Tests (depends on unit tests)
  test-integration:
    name: Integration Tests
    needs: [test-backend-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run integration tests
        run: pytest tests/integration -v --tb=short
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/cloudforge_test"
          REDIS_URL: "redis://localhost:6379"
          SECRET_KEY: "test-secret-key"

  # Stage 4: Security Scans (parallel, depends on lint)
  security-backend:
    name: Backend Security Scan
    needs: [lint-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: |
          pip-audit -r backend/requirements.txt --format json --output pip-audit.json || true
          cat pip-audit.json
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: backend-security
          path: pip-audit.json
          retention-days: 30

  security-frontend:
    name: Frontend Security Scan
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run npm audit
        run: npm audit --json > npm-audit.json || true
        working-directory: frontend
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security
          path: frontend/npm-audit.json
          retention-days: 30

  # Stage 5: Build Verification
  build:
    name: Build Verification
    needs: [test-backend-unit, test-frontend-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sk dist | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"
          # Target: 500KB gzipped (allowing some margin for uncompressed)
          if [ $BUNDLE_SIZE -gt 5000 ]; then
            echo "::warning::Bundle size (${BUNDLE_SIZE}KB) exceeds 5MB uncompressed target"
          fi
          # Check gzipped size
          GZIP_SIZE=$(find dist -name "*.js" -exec gzip -c {} \; | wc -c)
          GZIP_KB=$((GZIP_SIZE / 1024))
          echo "Gzipped JS size: ${GZIP_KB}KB"
          if [ $GZIP_KB -gt 500 ]; then
            echo "::error::Gzipped bundle size (${GZIP_KB}KB) exceeds 500KB target"
            exit 1
          fi
        working-directory: frontend

  # Final gate check
  ci-complete:
    name: CI Complete
    needs: [test-integration, security-backend, security-frontend, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Integration tests: ${{ needs.test-integration.result }}"
          echo "Build: ${{ needs.build.result }}"
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          fi
          echo "All required checks completed"
