name: Integration Tests

on:
  workflow_run:
    workflows:
      - Unit Tests
    types:
      - completed
  workflow_dispatch:

jobs:
  integration:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve checkout ref
        id: resolve-ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-ref.outputs.sha }}
          fetch-depth: 0

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Start full stack
        run: docker compose --profile full up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Backend not ready yet... ($i)"
            sleep 5
          done
          echo "Backend failed to become healthy." >&2
          docker compose logs backend
          exit 1

      - name: Wait for frontend availability
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 > /dev/null; then
              echo "Frontend is reachable."
              exit 0
            fi
            echo "Frontend not ready yet... ($i)"
            sleep 5
          done
          echo "Frontend failed to become reachable." >&2
          docker compose logs frontend
          exit 1

      - name: Run integration smoke checks
        run: |
          curl -sSf http://localhost:8000/health
          curl -sSf http://localhost:3000

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose --profile full down -v
