name: cloudforge-stack

services:
  postgres:
    image: postgres:15-alpine
    container_name: cloudforge-postgres
    environment:
      POSTGRES_USER: cloudforge
      POSTGRES_PASSWORD: cloudforge_dev_password
      POSTGRES_DB: cloudforge
    # ports:
    #   - "55433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cloudforge-redis
    # ports:
    #   - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudforge-backend
    environment:
      DATABASE_URL: postgresql://cloudforge:cloudforge_dev_password@postgres:5432/cloudforge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev_secret_key_change_in_production
      ENVIRONMENT: development
      INFRACOST_API_KEY: ***REDACTED_INFRACOST_KEY***
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - generated_terraform:/app/generated_terraform
      - ./Cloud_Services:/app/Cloud_Services:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudforge-celery
    environment:
      DATABASE_URL: postgresql://cloudforge:cloudforge_dev_password@postgres:5432/cloudforge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev_secret_key_change_in_production
      ENVIRONMENT: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
    volumes:
      - ./backend:/app
      - generated_terraform:/app/generated_terraform
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudforge-frontend
    # profiles: ["full"]
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  generated_terraform:
  frontend_node_modules:
