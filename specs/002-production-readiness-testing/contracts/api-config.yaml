openapi: 3.0.3
info:
  title: CloudForge Configuration API
  description: Configuration validation and environment management endpoints
  version: 1.0.0

paths:
  /api/config/validate:
    get:
      summary: Validate current configuration
      description: Returns validation status for all required configuration settings
      operationId: validateConfig
      tags:
        - Configuration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuration validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigValidationResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - admin only

  /api/config/environment:
    get:
      summary: Get current environment info
      description: Returns non-sensitive environment information
      operationId: getEnvironment
      tags:
        - Configuration
      responses:
        '200':
          description: Environment information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentResponse'

components:
  schemas:
    ConfigValidationResponse:
      type: object
      required:
        - valid
        - checked_at
        - results
      properties:
        valid:
          type: boolean
          description: Whether all required config is valid
        checked_at:
          type: string
          format: date-time
        environment:
          type: string
          enum: [development, staging, production]
        results:
          type: array
          items:
            $ref: '#/components/schemas/ConfigCheckResult'

    ConfigCheckResult:
      type: object
      required:
        - key
        - status
      properties:
        key:
          type: string
          description: Configuration key name (secrets redacted)
          example: DATABASE_URL
        status:
          type: string
          enum: [valid, missing, invalid]
        message:
          type: string
          description: Validation message
        required:
          type: boolean
          description: Whether this config is required

    EnvironmentResponse:
      type: object
      required:
        - environment
        - version
      properties:
        environment:
          type: string
          enum: [development, staging, production]
        version:
          type: string
          description: Application version
        build_date:
          type: string
          format: date-time
        features:
          type: object
          additionalProperties:
            type: boolean
          description: Feature flags status
          example:
            terraform_v2: true
            ai_assistant: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
