# GitHub Actions CI Workflow Contract
# Validates pull requests before merge

name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # Stage 1: Code Quality (parallel)
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install flake8 black mypy
      - name: Run flake8
        run: flake8 backend/app --max-line-length=120
      - name: Check formatting
        run: black --check backend/app
      - name: Run mypy
        run: mypy backend/app --ignore-missing-imports

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

  # Stage 2: Unit Tests (parallel, depends on lint)
  test-backend-unit:
    name: Backend Unit Tests
    needs: [lint-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      - name: Run unit tests
        run: |
          pytest backend/tests/unit -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: test-secret-key
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

  test-frontend-unit:
    name: Frontend Unit Tests
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run unit tests
        run: npm run test:coverage
        working-directory: frontend
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 30

  # Stage 3: Integration Tests (depends on unit tests)
  test-integration:
    name: Integration Tests
    needs: [test-backend-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: cloudforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run integration tests
        run: pytest backend/tests/integration -v --tb=short
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/cloudforge_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key

  # Stage 4: Security Scans (parallel, depends on lint)
  security-backend:
    name: Backend Security Scan
    needs: [lint-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Don't block on service unavailability
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt --format json --output pip-audit.json || true
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: backend-security
          path: pip-audit.json
          retention-days: 30

  security-frontend:
    name: Frontend Security Scan
    needs: [lint-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run npm audit
        run: npm audit --json > npm-audit.json || true
        working-directory: frontend
      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security
          path: frontend/npm-audit.json
          retention-days: 30

  security-terraform:
    name: Terraform Security Scan
    needs: [lint-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run TFSec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          format: json
          out: tfsec-results.json
      - name: Upload TFSec results
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-results
          path: tfsec-results.json
          retention-days: 30

  # Stage 5: E2E Tests (depends on unit tests, runs on PR only)
  test-e2e:
    name: E2E Tests
    needs: [test-frontend-unit, test-integration]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Start application
        run: |
          docker compose up -d
          sleep 30  # Wait for services to be ready
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: frontend
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30
      - name: Cleanup
        if: always()
        run: docker compose down

  # Stage 6: Build Verification
  build:
    name: Build Verification
    needs: [test-backend-unit, test-frontend-unit]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sk frontend/dist | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"
          if [ $BUNDLE_SIZE -gt 512000 ]; then
            echo "::warning::Bundle size exceeds 500MB target"
          fi

  # Final gate check
  ci-complete:
    name: CI Complete
    needs: [test-integration, security-backend, security-frontend, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test-integration.result }}" != "success" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed"
            exit 1
          fi
          echo "All required checks passed"
