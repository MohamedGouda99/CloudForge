<!DOCTYPE html>
<html>
<head>
    <title>API Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>CloudForge API Connection Test</h1>

    <div>
        <button onclick="testPipelineAPI()">Test Pipeline API (Port 8001)</button>
        <button onclick="testBackendAPI()">Test Backend API (Port 8000)</button>
    </div>

    <div id="results"></div>

    <script>
        async function testPipelineAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="test">Testing Pipeline API...</div>';

            try {
                const response = await fetch('http://localhost:8001/api/workflows/node-types', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                const data = await response.json();

                resultsDiv.innerHTML = `
                    <div class="test success">
                        <h3>✅ Pipeline API (Port 8001) - SUCCESS</h3>
                        <p>Status: ${response.status}</p>
                        <p>Node Types Found: ${data.node_types?.length || 0}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test error">
                        <h3>❌ Pipeline API (Port 8001) - FAILED</h3>
                        <p>Error: ${error.message}</p>
                        <p><strong>This means the pipeline-api container is not running or not accessible.</strong></p>
                        <p>Check:</p>
                        <ul>
                            <li>Is the pipeline-api container running?</li>
                            <li>Is port 8001 exposed?</li>
                            <li>Are there any firewall issues?</li>
                        </ul>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }

        async function testBackendAPI() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="test">Testing Backend API...</div>';

            try {
                const response = await fetch('http://localhost:8000/api/health', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                const data = await response.json();

                resultsDiv.innerHTML = `
                    <div class="test success">
                        <h3>✅ Backend API (Port 8000) - SUCCESS</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="test error">
                        <h3>❌ Backend API (Port 8000) - FAILED</h3>
                        <p>Error: ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }
        }

        // Auto-run tests on page load
        window.onload = () => {
            testPipelineAPI();
        };
    </script>
</body>
</html>
