# Render Blueprint — provisions the CloudForge backend web service only.
# Database + cache live on FREE external providers to stay on a zero-dollar
# plan (Render deprecated free Postgres/Redis in 2024).
#
# Required free accounts:
#   1. Neon        https://console.neon.tech    (Postgres, no card)
#   2. Upstash     https://console.upstash.com  (Redis, no card)
#   3. Render      https://dashboard.render.com (web service, no card)
#   4. Vercel      https://vercel.com           (frontend, already signed up)
#
# Deployment flow (details in DEPLOYMENT.md):
#   1. Create a Neon project  → copy the "pooled" connection string
#   2. Create an Upstash Redis DB → copy the rediss:// URL
#   3. Push this repo → Render dashboard → New → Blueprint Instance
#   4. When prompted, paste DATABASE_URL (Neon) and REDIS_URL (Upstash)
#   5. Render builds the Dockerfile and exposes a public URL
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cloudforge-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      # External managed services — paste these once in the Render dashboard
      # when the Blueprint prompts you.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      # App settings — auto-applied
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        # Will be updated to the Vercel URL after the frontend deploys.
        value: http://localhost:3000
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"

      # Secret key — Render generates a strong random value on first deploy
      - key: SECRET_KEY
        generateValue: true

      # Default admin user (created on first boot). CHANGE after first login.
      - key: INITIAL_ADMIN_USERNAME
        value: admin
      - key: INITIAL_ADMIN_PASSWORD
        value: admin123
      - key: INITIAL_ADMIN_EMAIL
        value: admin@cloudforge.dev

      # Optional feature keys — fill in the Render dashboard to enable.
      - key: INFRACOST_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
