# Render Blueprint — provisions the CloudForge backend + managed Postgres +
# Key-Value (Redis) in one shot. The frontend lives on Vercel and is not
# managed here.
#
# To deploy:
#   1. Go to https://dashboard.render.com/blueprints
#   2. Click "New Blueprint Instance" → connect this repo
#   3. Render reads this file and provisions everything on the free plan
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cloudforge-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      # Database + cache — injected by the managed resources below
      - key: DATABASE_URL
        fromDatabase:
          name: cloudforge-postgres
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: cloudforge-redis
          property: connectionString

      # App settings
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        # Updated after the Vercel frontend is deployed.
        value: http://localhost:3000
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"

      # Secret key — Render generates a random strong value on first deploy
      - key: SECRET_KEY
        generateValue: true

      # Default admin user (created on first boot). CHANGE after first login.
      - key: INITIAL_ADMIN_USERNAME
        value: admin
      - key: INITIAL_ADMIN_PASSWORD
        value: admin123
      - key: INITIAL_ADMIN_EMAIL
        value: admin@cloudforge.dev

      # Optional feature keys — users can fill these in the Render dashboard.
      - key: INFRACOST_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false

databases:
  - name: cloudforge-postgres
    databaseName: cloudforge
    user: cloudforge
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []

  - name: cloudforge-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
